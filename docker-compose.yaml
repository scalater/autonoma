services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  postgresql:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
          sleep 1
        done
        /usr/bin/mc mb --ignore-existing local/autonoma-local
        /usr/bin/mc admin config set local api \
          cors_allow_origin="http://localhost:3000,http://127.0.0.1:3000"
        /usr/bin/mc admin service restart --json --disable-pager local
    restart: "no"

volumes:
  pgdata:
  miniodata:
