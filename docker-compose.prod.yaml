services:
  postgresql:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autonoma
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autonoma"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    image: ghcr.io/scalater/autonoma-migrate:latest
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgresql:5432/autonoma
    depends_on:
      postgresql:
        condition: service_healthy
    restart: on-failure

  api:
    image: ghcr.io/scalater/autonoma-api:latest
    env_file: .env
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  ui:
    image: ghcr.io/scalater/autonoma-ui:latest
    environment:
      API_UPSTREAM: api:4000
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
