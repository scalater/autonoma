services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    labels:
      - "com.github.nginx-proxy.nginx=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    restart: unless-stopped

  acme-companion:
    image: nginxproxy/acme-companion
    depends_on:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
    environment:
      DEFAULT_EMAIL: guillermo@scalater.com
    restart: unless-stopped

  postgresql:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autonoma
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autonoma"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    image: ghcr.io/scalater/autonoma-migrate:latest
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgresql:5432/autonoma
    depends_on:
      postgresql:
        condition: service_healthy
    restart: on-failure

  api:
    image: ghcr.io/scalater/autonoma-api:latest
    env_file: .env
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  ui:
    image: ghcr.io/scalater/autonoma-ui:latest
    environment:
      API_UPSTREAM: api:4000
      VIRTUAL_HOST: autonoma.scalater.com
      VIRTUAL_PORT: "3000"
      LETSENCRYPT_HOST: autonoma.scalater.com
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  certs:
  vhost:
  html:
  acme:
